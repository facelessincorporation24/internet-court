services:
  - type: web
    name: internet-court
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: internet-court-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false

databases:
  - name: internet-court-db
    databaseName: internet_court
    plan: free